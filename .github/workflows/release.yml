name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions: {}

jobs:
  # Stage 0: Run tests before building anything
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/pidscope-builder-appimage:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run unit tests
        run: octave --no-gui --eval "run('tests/run_tests.m')"

  # Stage 1: Build Docker builder images (3 parallel)
  build-appimage-builder:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-appimage:latest ./packaging/appimage
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-appimage:latest

  build-windows-builder:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-windows:latest ./packaging/windows
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-windows:latest

  build-macos-blackbox:
    needs: test
    strategy:
      matrix:
        include:
          - runner: macos-15
            arch_name: arm64
          - runner: macos-15-intel
            arch_name: x86_64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Build blackbox_decode
        run: |
          git clone --depth 1 https://github.com/betaflight/blackbox-tools.git
          cd blackbox-tools
          make DEBUG= obj/blackbox_decode
          cp obj/blackbox_decode ../blackbox_decode.${{ matrix.arch_name }}
          codesign --force --sign - ../blackbox_decode.${{ matrix.arch_name }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: blackbox-decode-${{ matrix.arch_name }}
          path: blackbox_decode.${{ matrix.arch_name }}

  # Stage 2: Build packages (each depends only on its own builder)
  build-appimage:
    needs: build-appimage-builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AppImage
        run: |
          mkdir -p dist
          docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-appimage:latest
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/dist:/dist \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-appimage:latest

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: appimage
          path: dist/PIDscope-*-x86_64.AppImage

  build-windows:
    needs: build-windows-builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows ZIP
        run: |
          mkdir -p dist
          docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-windows:latest
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/dist:/dist \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/pidscope-builder-windows:latest

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: windows-zip
          path: dist/PIDscope-*-windows-x86_64.zip

  build-macos:
    needs: build-macos-blackbox
    runs-on: macos-15
    permissions:
      contents: read
    env:
      INAV_BB_VERSION: "9.0.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: blackbox-decode-*
          merge-multiple: true

      - name: Download INAV blackbox_decode
        run: |
          brew install zstd
          wget -q "https://github.com/iNavFlight/blackbox-tools/releases/download/v${INAV_BB_VERSION}/blackbox-tools-${INAV_BB_VERSION}_macos-aarch64.tar.zst" -O inav-arm64.tar.zst
          tar --zstd -xf inav-arm64.tar.zst && cp bin/blackbox_decode blackbox_decode_INAV.arm64 && rm -rf bin share inav-arm64.tar.zst
          wget -q "https://github.com/iNavFlight/blackbox-tools/releases/download/v${INAV_BB_VERSION}/blackbox-tools-${INAV_BB_VERSION}_macos-x86_64.tar.zst" -O inav-x86.tar.zst
          tar --zstd -xf inav-x86.tar.zst && cp bin/blackbox_decode blackbox_decode_INAV.x86_64 && rm -rf bin share inav-x86.tar.zst

      - name: Package macOS ZIP
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          STAGING="/tmp/PIDscope-${VERSION}-macos"
          mkdir -p "$STAGING"
          cp PIDscope.m "$STAGING/"
          cp -r src "$STAGING/"
          cp VERSION "$STAGING/"
          cp packaging/macos/pidscope.command "$STAGING/"
          chmod +x "$STAGING/pidscope.command"
          cp blackbox_decode.arm64 blackbox_decode.x86_64 "$STAGING/"
          cp blackbox_decode_INAV.arm64 blackbox_decode_INAV.x86_64 "$STAGING/"
          chmod +x "$STAGING"/blackbox_decode*
          if [ -f packaging/com.pidscope.PIDscope.png ]; then cp packaging/com.pidscope.PIDscope.png "$STAGING/PIDscope.png"; fi
          cat > "$STAGING/README-macOS.txt" <<'HEREDOC'
          PIDscope - Blackbox Flight Log Analyzer

          SETUP:
          1. brew install octave
          2. xattr -cr ~/Downloads/PIDscope-*-macos
          3. Double-click pidscope.command
             (Octave packages are installed automatically on first launch)

          Project: https://buymeacoffee.com/dzikus
          License: GPL v3
          HEREDOC
          mkdir -p dist
          cd /tmp && zip -r -q "$GITHUB_WORKSPACE/dist/PIDscope-${VERSION}-macos-universal.zip" "PIDscope-${VERSION}-macos"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: macos-zip
          path: dist/PIDscope-*-macos-universal.zip

  # Stage 3: Create GitHub Release
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-appimage, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: |
            artifacts/appimage/*
            artifacts/windows-zip/*
            artifacts/macos-zip/*
          generate_release_notes: true
          draft: ${{ contains(github.ref_name, 'beta') }}
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
